name: PSX Daily Pipeline

on:
  schedule:
    - cron: '0 18 * * *'  # Runs daily at 11PM PKT
  workflow_dispatch:

# IMPORTANT: allow GITHUB_TOKEN to push commits
permissions:
  contents: write

# Prevent overlapping runs from fighting over main
concurrency:
  group: psx-daily-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Java (required for PySpark)
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jdk

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run ingestion
      run: python src/ingest.py

    - name: Run transformations
      run: python src/transform.py

    - name: Commit updated data
      run: |
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"

        git add data/

        # Only commit/push if something changed
        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        git commit -m "Auto-update PSX data $(date '+%Y-%m-%d')"

        # Sync with remote main to avoid non-fast-forward push failures
        git fetch origin main
        git rebase origin/main

        # Push explicitly to main
        git push origin HEAD:main
