name: PSX Daily Pipeline

on:
  schedule:
    - cron: '0 18 * * *'  # Runs daily at 11PM PKT
  workflow_dispatch:       # Manual trigger from GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Java (required for PySpark)
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jdk

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run ingestion
      run: python src/ingest.py

    - name: Run transformations
      run: python src/transform.py

    - name: Commit updated data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update PSX data $(date '+%Y-%m-%d')"
        git push