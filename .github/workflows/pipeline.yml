name: PSX Daily Pipeline
on:
  schedule:
    - cron: '0 18 * * *'  # Runs daily at 11PM PKT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: psx-daily-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Java (required for PySpark)
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        run: python src/ingest.py

      - name: Run transformations
        run: python src/transform.py

      - name: Commit updated data (rebase + push retry)
        shell: bash
        run: |
          set -euo pipefail

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto-update PSX data $(TZ=Asia/Karachi date '+%Y-%m-%d')"

          for attempt in 1 2 3; do
            echo "Attempt $attempt: fetch + rebase onto origin/main"
            git fetch origin main
            git rebase --no-edit origin/main || { echo "Rebase failed (conflict). Aborting."; exit 1; }

            echo "Attempt $attempt: pushing to main"
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi

            echo "Push failed. Retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done

          echo "Push failed after 3 attempts."
          exit 1
